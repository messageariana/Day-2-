<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Welcome ✨</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>

<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;

    font-family: 'Quicksand', sans-serif;
    background: linear-gradient(135deg, #fff1f7, #f3e8ff, #ffffff);
    overflow: hidden;
    color: #5b4b7a;
  }

  /* soft glowing blobs */
  .blob {
    position: absolute;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.3;
    z-index: 0;
    animation: float 6s ease-in-out infinite;
  }

  .b1 { background: #fbcfe8; top: -80px; left: -80px; }
  .b2 { background: #c4b5fd; bottom: -80px; right: -80px; }

  @keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
  }

  h1 {
    font-size: 3rem;
    z-index: 2;
    animation: fadeIn 1.2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .arrow {
    margin-top: 2rem;
    font-size: 2.5rem;
    cursor: pointer;
    transition: transform 0.2s ease;
    z-index: 2;
    animation: bounce 1.5s infinite;
  }

  .arrow:hover {
    transform: scale(1.2);
  }

  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(10px); }
  }
</style>
</head>

<body>

<div class="blob b1"></div>
<div class="blob b2"></div>

<h1>Welcome!</h1>

<!-- arrow button -->
<div class="arrow" onclick="go()">⬇</div>

<script>
function go() {
  window.location.href = "index.html";
}
</script>

</body>
</html>
